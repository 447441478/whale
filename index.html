<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>未来已来</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #0f2027, #0a0f1c 60%);
      color: #e6f1ff;
      height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0,255,255,0.1);
    }

    header h1 {
      color: #00ffff;
      letter-spacing: 2px;
    }

    .hero {
      height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00ffff, #00aaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: #9fb3c8;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 30px;
      border: 1px solid #00ffff;
      color: #00ffff;
      background: transparent;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 20px #00ffff;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #6c7a89;
      border-top: 1px solid rgba(0,255,255,0.1);
    }

    footer a {
      color: #6c7a89;
      text-decoration: none;
    }

    footer a:hover {
      color: #00ffff;
    }

    /* 动态背景线条 */
    .grid {
      position: fixed;
      width: 200%;
      height: 200%;
      background-image: linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg);
      animation: move 20s linear infinite;
      z-index: -1;
    }

    @keyframes move {
      from { transform: perspective(500px) rotateX(60deg) translateY(0); }
      to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

  </style>
</head>
<body>

<div class="grid"></div>

<header>
  <h1>MY TECH SITE</h1>
</header>

<section class="hero">
  <h2>未来已来 🚀</h2>
  <p>构建属于你的科技世界 · AI · Web · 数据 · 云计算</p>
  <button class="btn">开始探索</button>
</section>

<footer>
  <a href="https://beian.miit.gov.cn/" target="_blank">闽ICP备2026008670号-1</a>
</footer>

</body>
</html>
